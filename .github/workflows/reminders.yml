name: Lembretes de tarefas

# Um "relógio" externo grátis que, de ~10 em 10 min, toca no endpoint de
# lembretes do admin. Necessário porque o cron do plano Hobby da Vercel só
# corre 1×/dia — isto dá granularidade de minutos aos lembretes "lembra-me
# a esta data/hora". O endpoint valida o CRON_SECRET, por isso a chamada é
# segura mesmo sendo pública.
#
# Nota: o GitHub agenda os cron dos workflows em "best-effort" — pode
# atrasar 5-15 min em horas de pico. Chega para lembretes.
#
# Segredo necessário (uma vez): repositório → Settings → Secrets and
# variables → Actions → New repository secret → CRON_SECRET (o MESMO valor
# que está na Vercel).

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {} # permite disparar à mão para testar

# Se um disparo se atrasar e sobrepor ao seguinte, não acumular.
concurrency:
  group: task-reminders
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar lembretes por enviar
        run: |
          curl -fsS --max-time 60 -X GET \
            "https://admin.floresabeirario.pt/api/cron/reminders" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
